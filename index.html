<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Rooms</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div class="loginCard">
    <h1>Rooms</h1>
    <input id="usernameInput" type="text" placeholder="Username" autocomplete="off"/>
    <input id="roomInput" type="text" placeholder="Room code (optional)" autocomplete="off"/>
    <button onclick="login()">Join</button>
  </div>
</div>

<!-- ══ CHAT ══ -->
<div id="chatScreen" style="display:none;">

  <!-- HEADER -->
  <div id="header">
    <button class="iconBtn" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="headerInfo">
      <div id="headerRoom"></div>
      <div id="headerSub">active now</div>
    </div>
    <button class="iconBtn callBtn" onclick="startCall()" title="Voice Call">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </button>
  </div>

  <!-- MESSAGES -->
  <div id="chatBox"></div>

  <!-- TYPING -->
  <div id="typingBar"></div>

  <!-- INPUT -->
  <div id="inputBar">
    <button class="iconBtn" onclick="toggleStickers()" id="stickerToggleBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
    </button>
    <button class="iconBtn" onclick="document.getElementById('imgInput').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <input id="imgInput" type="file" accept="image/*" style="display:none;" onchange="sendImage(this)"/>
    <button class="iconBtn" id="micBtn"
      onmousedown="startRecording()" onmouseup="stopRecording()"
      ontouchstart="startRecording(event)" ontouchend="stopRecording()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <input id="messageInput" type="text" placeholder="Message..."
      onkeydown="if(event.key==='Enter') sendText()"
      oninput="onInput()" autocomplete="off"/>
    <button id="sendBtn" onclick="sendText()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

  <!-- STICKER PANEL -->
  <div id="stickerPanel" style="display:none;">
    <div id="stickerCats"></div>
    <div id="stickerGrid"></div>
  </div>

</div>

<!-- ══ IMAGE VIEWER ══ -->
<div id="imgViewer" style="display:none;" onclick="closeImgViewer()">
  <img id="imgViewerSrc"/>
  <div id="imgViewerActions">
    <button onclick="downloadCurrentImg(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Save
    </button>
    <button onclick="closeImgViewer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Close
    </button>
  </div>
</div>

<!-- ══ INCOMING CALL ══ -->
<div id="incomingCallUI" style="display:none;">
  <div id="incomingCallCard">
    <div class="callAvatar" id="incomingAvatar"></div>
    <div id="incomingCallName"></div>
    <div class="callSubtitle">Incoming voice call</div>
    <div class="callActions">
      <button class="callActionBtn decline" onclick="declineCall()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M23.36 14.21c-2.03-.22-4.01-.76-5.84-1.6a2 2 0 0 0-2.03.25l-2.52 2.52a15.05 15.05 0 0 1-6.33-6.33l2.52-2.52a2 2 0 0 0 .25-2.03A18.55 18.55 0 0 1 7.8.64 2 2 0 0 0 5.82 0L2 0a2 2 0 0 0-2 2.18 20 20 0 0 0 21.82 21.82A2 2 0 0 0 24 22v-3.82a2 2 0 0 0-1.64-1.97z"/></svg>
      </button>
      <button class="callActionBtn accept" onclick="acceptIncomingCall()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══ ACTIVE CALL UI ══ -->
<div id="callUI" style="display:none;">
  <div class="callWave">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div id="callWithName"></div>
  <div id="callStatus">Calling...</div>
  <div class="activeCallActions">
    <button class="iconBtn callCtrl" id="muteBtn" onclick="toggleMute()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
    </button>
    <button class="callEndBtn" onclick="endCall()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><path d="M23.36 14.21c-2.03-.22-4.01-.76-5.84-1.6a2 2 0 0 0-2.03.25l-2.52 2.52a15.05 15.05 0 0 1-6.33-6.33l2.52-2.52a2 2 0 0 0 .25-2.03A18.55 18.55 0 0 1 7.8.64 2 2 0 0 0 5.82 0L2 0a2 2 0 0 0-2 2.18 20 20 0 0 0 21.82 21.82A2 2 0 0 0 24 22v-3.82a2 2 0 0 0-1.64-1.97z"/></svg>
    </button>
    <button class="iconBtn callCtrl" id="speakerBtn" onclick="toggleSpeaker()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    </button>
  </div>
</div>

<!-- ══ DELETE MENU ══ -->
<div id="menuOverlay" style="display:none;" onclick="closeMenu()"></div>
<div id="deleteMenu" style="display:none;">
  <button class="delBtn" onclick="confirmDelete()">Delete message</button>
  <button class="cancelBtn" onclick="closeMenu()">Cancel</button>
</div>

<audio id="remoteAudio" autoplay playsinline></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="script.js"></script>
</body>
</html>
